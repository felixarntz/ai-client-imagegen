name: TypeScript CI

on:
  push:
    branches:
      - main
    paths:
      - '**.ts'
      - '**.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.nvmrc'
      - '.github/workflows/ci-ts.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**.ts'
      - '**.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.nvmrc'
      - '.github/workflows/ci-ts.yml'

jobs:
  eslint:
    name: 'ESLint - Node 22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint-js

  typecheck:
    name: 'Type Check - Node 22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck
